<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESG Platform — Core Entity Relationship Diagram</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f9f8f5;
      color: #2c2c2a;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 4px;
    }
    p {
      font-size: 13px;
      color: #5f5e5a;
      margin: 0 0 20px;
    }
    #erd {
      background: #fff;
      border: 1px solid #d3d1c7;
      border-radius: 12px;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1c; color: #c2c0b6; }
      #erd { background: #2c2c2a; border-color: #444441; }
      h1 { color: #e8e6dc; }
    }
  </style>
</head>
<body>
  <h1>ESG Portfolio Intelligence Platform — Core ERD</h1>
  <p>Entity relationships for the MVP domain model. Seven entities covering portfolio, holdings, assets, ESG scores, metric snapshots, anomaly results, and alerts.</p>
  <div id="erd"></div>

  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    await document.fonts.ready;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'system-ui, sans-serif',
      themeVariables: {
        darkMode: dark,
        fontSize: '13px',
        fontFamily: 'system-ui, sans-serif',
        lineColor: dark ? '#9c9a92' : '#73726c',
        textColor: dark ? '#c2c0b6' : '#3d3d3a',
        primaryColor: dark ? '#3C3489' : '#EEEDFE',
        primaryTextColor: dark ? '#CECBF6' : '#3C3489',
        primaryBorderColor: dark ? '#7F77DD' : '#AFA9EC',
        secondaryColor: dark ? '#085041' : '#E1F5EE',
        tertiaryColor: dark ? '#3C3489' : '#EEEDFE',
      },
    });

    const { svg } = await mermaid.render('erd-svg', `erDiagram
      Portfolio {
        uuid id PK
        string name
        string owner
        enum status
        timestamptz created_at
        timestamptz updated_at
      }
      Holding {
        uuid id PK
        uuid portfolio_id FK
        uuid asset_id FK
        decimal weight
        timestamptz created_at
      }
      Asset {
        uuid id PK
        string ticker
        string name
        enum asset_class
        string sector
        timestamptz created_at
      }
      EsgScore {
        uuid id PK
        uuid asset_id FK
        date enrichment_date
        decimal environmental_score
        decimal social_score
        decimal governance_score
        decimal composite_score
        decimal carbon_intensity
        string provider
        timestamptz created_at
      }
      MetricSnapshot {
        uuid id PK
        uuid portfolio_id FK
        timestamptz computed_at
        decimal weighted_esg_composite
        decimal weighted_environmental
        decimal weighted_social
        decimal weighted_governance
        decimal esg_score_volatility
        decimal max_holding_weight
        int holding_count
        timestamptz created_at
      }
      AnomalyResult {
        uuid id PK
        uuid snapshot_id FK
        boolean is_anomalous
        decimal anomaly_score
        string model_version
        timestamptz detected_at
      }
      Alert {
        uuid id PK
        uuid portfolio_id FK
        uuid snapshot_id FK
        enum alert_type
        enum severity
        string message
        decimal threshold_value
        decimal observed_value
        enum status
        timestamptz created_at
        timestamptz acknowledged_at
      }

      Portfolio ||--o{ Holding : "has"
      Asset ||--o{ Holding : "referenced by"
      Asset ||--o{ EsgScore : "enriched as"
      Portfolio ||--o{ MetricSnapshot : "snapshots"
      MetricSnapshot ||--o| AnomalyResult : "flagged by"
      Portfolio ||--o{ Alert : "triggers"
      MetricSnapshot ||--o{ Alert : "causes"
    `);

    document.getElementById('erd').innerHTML = svg;

    // Round entity box corners
    document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    // Strip row borders
    document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  </script>
</body>
</html>
